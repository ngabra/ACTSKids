<h2>Register for ACTS Kids</h2>

<p>Please complete the form below to enroll your child in the ACTS Kids program.</p>

<label>Parent Name</label>
<input type="text" required>

<label>Email</label>
<input type="email" required>

<label>Phone Number</label>
<input type="tel">

<label>Child Name</label>
<input type="text" required>

<label>Child Age</label>

<label>Church</label>
<input type="text">

<label>Additional Notes</label>

</form>
